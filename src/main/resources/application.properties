spring.application.name=OrderTrackingSupportBot

# ============================================
# Server
# ============================================
server.port=8080

# ============================================
# OpenAI
# ============================================
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.4

# ============================================
# PostgreSQL - LOCAL (override via env vars on Render)
# ============================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Cache
# ============================================
spring.cache.type=simple

# ============================================
# CORS (configure frontend URL)
# ============================================
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}